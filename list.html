<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f8fafc;
            padding-top:90px;
        }

        .page-header{
            background:linear-gradient(135deg,#0d6efd,#4f46e5);
            color:white;
            padding:2rem;
            border-radius:20px;
            margin-bottom:2rem;
            box-shadow:0 12px 30px rgba(13,110,253,.15);
        }

        .order-card{
            border:none;
            border-radius:18px;
            overflow:hidden;
            transition:.3s;
        }

        .order-card:hover{
            transform:translateY(-4px);
            box-shadow:0 15px 35px rgba(0,0,0,.12)!important;
        }

        .product-image{
            width:75px;
            height:75px;
            object-fit:contain;
            background:white;
            border-radius:12px;
            padding:8px;
            border:1px solid #e9ecef;
        }

        .extra-count{
            width:75px;
            height:75px;
            border-radius:12px;
            background:#eef2ff;
            color:#4f46e5;
            font-weight:700;
        }

        .status-badge{
            padding:.6rem 1rem;
            border-radius:50px;
            font-size:.8rem;
            font-weight:600;
        }

        .amount-pill{
            display:inline-block;
            padding:.7rem 1rem;
            border-radius:50px;
            background:#f8fafc;
            border:1px solid #e9ecef;
        }

        .amount{
            color:#0d6efd;
            font-weight:700;
            font-size:1.3rem;
        }

        .order-title{
            color:#212529;
            transition:.2s;
        }

        .order-card:hover .order-title{
            color:#0d6efd;
        }

        .empty-card{
            border:none;
            border-radius:20px;
        }

    </style>

</head>

<body>

<!-- NAVBAR COMES HERE -->

<div class="container py-4" style="max-width:900px;">

    <!-- Header -->

    <div class="page-header">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>

                <h2 class="fw-bold mb-2">
                    <i class="bi bi-bag-check-fill me-2"></i>
                    My Orders
                </h2>

                <p class="mb-0 opacity-75">
                    Track and manage all your purchases
                </p>

            </div>

            <div class="mt-3 mt-md-0">

                <span class="badge bg-light text-dark fs-6 px-3 py-2">

                    <span th:text="${#lists.size(orders)}"></span>
                    Orders

                </span>

            </div>

        </div>

    </div>

    <!-- Empty State -->

    <div th:if="${#lists.isEmpty(orders)}"
         class="card shadow-sm empty-card">

        <div class="card-body text-center py-5">

            <i class="bi bi-bag-x text-secondary"
               style="font-size:4rem;"></i>

            <h4 class="fw-bold mt-3">
                No Orders Found
            </h4>

            <p class="text-muted mb-0">
                You haven't placed any orders yet.
            </p>

        </div>

    </div>

    <!-- Orders -->

    <div th:unless="${#lists.isEmpty(orders)}">

        <div th:each="order : ${orders}">

            <a th:href="@{/orders/{id}(id=${order.orderId})}"
               class="text-decoration-none">

                <div class="card shadow-sm mb-4 order-card">

                    <div class="card-body p-4">

                        <div class="row align-items-center">

                            <!-- Images -->

                            <div class="col-md-3 mb-3 mb-md-0">

                                <div class="d-flex gap-2 flex-wrap">

                                    <th:block th:each="item,iter : ${order.items}">

                                        <img th:if="${iter.index < 2}"
                                             th:src="${item.itemUrl}"
                                             th:alt="${item.productName}"
                                             class="product-image">

                                    </th:block>

                                    <div th:if="${#lists.size(order.items) > 2}"
                                         class="extra-count d-flex align-items-center justify-content-center">

                                        +<span th:text="${#lists.size(order.items)-2}"></span>

                                    </div>

                                </div>

                            </div>

                            <!-- Details -->

                            <div class="col-md-5">

                                <h5 class="fw-bold mb-2 order-title"
                                    th:if="${!#lists.isEmpty(order.items)}"
                                    th:text="${order.items[0].productName}">
                                </h5>

                                <small class="text-muted"
                                       th:if="${#lists.size(order.items) > 1}">

                                    +
                                    <span th:text="${#lists.size(order.items)-1}"></span>
                                    more item(s)

                                </small>

                                <div class="small text-muted mt-3">

                                    Order #
                                    <span th:text="${order.orderId}"></span>

                                </div>

                                <div class="small text-muted">

                                    Ordered on
                                    <span th:text="${#temporals.format(order.orderDate,'dd MMM yyyy')}"></span>

                                </div>

                            </div>

                            <!-- Status -->

                            <div class="col-md-4 text-md-end mt-3 mt-md-0">

                                <div class="mb-3">

                                    <span class="badge bg-success-subtle text-success status-badge"
                                          th:if="${order.status == 'DELIVERED'}">
                                        Delivered
                                    </span>

                                    <span class="badge bg-primary-subtle text-primary status-badge"
                                          th:if="${order.status == 'PROCESSING'}">
                                        Processing
                                    </span>

                                    <span class="badge bg-warning-subtle text-warning-emphasis status-badge"
                                          th:if="${order.status == 'OUT FOR DELIVERY'}">
                                        Out For Delivery
                                    </span>

                                    <span class="badge bg-danger-subtle text-danger status-badge"
                                          th:if="${order.status == 'CANCELLED'}">
                                        Cancelled
                                    </span>

                                </div>

                                <div class="amount-pill">

                                    <div class="amount">

                                        ₹<span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}"></span>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
