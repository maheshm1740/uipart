<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        * { font-family: 'Inter', sans-serif; }

        body {
            background: #f1f5f9;
            padding-top: 80px;
        }

        /* ── Page header ── */
        .page-header {
            background: linear-gradient(135deg, #1d4ed8 0%, #4f46e5 100%);
            color: white;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 24px rgba(79, 70, 229, .22);
        }

        .page-header h2 { font-size: 1.35rem; font-weight: 700; margin: 0; }
        .page-header p  { font-size: .83rem; opacity: .75; margin: .2rem 0 0; }

        .orders-count {
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 50px;
            padding: .35rem .9rem;
            font-size: .82rem;
            font-weight: 600;
            letter-spacing: .02em;
            white-space: nowrap;
        }

        /* ── Order card ── */
        .order-card {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #fff;
            transition: box-shadow .2s, transform .2s;
            margin-bottom: .85rem;
            overflow: hidden;
        }

        .order-card:hover {
            box-shadow: 0 8px 28px rgba(0,0,0,.09);
            transform: translateY(-2px);
        }

        .order-card .card-body {
            padding: 1rem 1.25rem;
        }

        /* ── Product thumbnails ── */
        .product-image {
            width: 56px;
            height: 56px;
            object-fit: contain;
            background: #f8fafc;
            border-radius: 10px;
            padding: 6px;
            border: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .extra-count {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            background: #eef2ff;
            color: #4f46e5;
            font-weight: 700;
            font-size: .82rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* ── Text ── */
        .order-name {
            font-size: .95rem;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.3;
            margin-bottom: .1rem;
            transition: color .15s;
        }

        .order-card:hover .order-name { color: #4f46e5; }

        .order-meta {
            font-size: .76rem;
            color: #94a3b8;
            line-height: 1.7;
        }

        /* ── Status badges ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .28rem .75rem;
            border-radius: 50px;
            font-size: .74rem;
            font-weight: 600;
            letter-spacing: .02em;
        }

        /* ── Amount ── */
        .amount {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1d4ed8;
        }

        /* ── Chevron ── */
        .chevron {
            color: #cbd5e1;
            font-size: 1rem;
            margin-left: .5rem;
        }

        /* ── Empty state ── */
        .empty-card {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #fff;
        }

        a.order-link { text-decoration: none; }

    </style>
</head>

<body>

<!-- NAVBAR COMES HERE -->

<div class="container py-4" style="max-width: 860px;">

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h2><i class="bi bi-bag-check-fill me-2"></i>My Orders</h2>
            <p>Track and manage all your purchases</p>
        </div>
        <span class="orders-count">
            <span th:text="${#lists.size(orders)}"></span> order(s)
        </span>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(orders)}" class="empty-card text-center py-5">
        <i class="bi bi-bag-x text-secondary" style="font-size:3rem;"></i>
        <h5 class="fw-bold mt-3 mb-1">No orders yet</h5>
        <p class="text-muted small mb-0">Once you place an order, it'll show up here.</p>
    </div>

    <!-- Orders List -->
    <div th:unless="${#lists.isEmpty(orders)}">
        <div th:each="order : ${orders}">

            <a th:href="@{/orders/{id}(id=${order.orderId})}" class="order-link">
                <div class="order-card">
                    <div class="card-body">

                        <div class="d-flex align-items-center gap-3">

                            <!-- Thumbnails -->
                            <div class="d-flex gap-2 flex-shrink-0">
                                <th:block th:each="item,iter : ${order.items}">
                                    <img th:if="${iter.index < 2}"
                                         th:src="${item.itemUrl}"
                                         th:alt="${item.productName}"
                                         class="product-image">
                                </th:block>
                                <div th:if="${#lists.size(order.items) > 2}" class="extra-count">
                                    +<span th:text="${#lists.size(order.items) - 2}"></span>
                                </div>
                            </div>

                            <!-- Details -->
                            <div class="flex-grow-1 min-width-0">
                                <div class="order-name"
                                     th:if="${!#lists.isEmpty(order.items)}"
                                     th:text="${order.items[0].productName}">
                                </div>
                                <div class="order-meta">
                                    <span th:if="${#lists.size(order.items) > 1}">
                                        +<span th:text="${#lists.size(order.items) - 1}"></span> more &nbsp;·&nbsp;
                                    </span>
                                    #<span th:text="${order.orderId}"></span>
                                    &nbsp;·&nbsp;
                                    <span th:text="${#temporals.format(order.orderDate,'dd MMM yyyy')}"></span>
                                </div>
                            </div>

                            <!-- Right side -->
                            <div class="d-flex flex-column align-items-end gap-1 flex-shrink-0">

                                <span class="badge bg-success-subtle text-success status-badge"
                                      th:if="${order.status == 'DELIVERED'}">
                                    <i class="bi bi-check-circle-fill"></i> Delivered
                                </span>
                                <span class="badge bg-primary-subtle text-primary status-badge"
                                      th:if="${order.status == 'PROCESSING'}">
                                    <i class="bi bi-hourglass-split"></i> Processing
                                </span>
                                <span class="badge bg-warning-subtle text-warning-emphasis status-badge"
                                      th:if="${order.status == 'OUT FOR DELIVERY'}">
                                    <i class="bi bi-truck"></i> Out for Delivery
                                </span>
                                <span class="badge bg-danger-subtle text-danger status-badge"
                                      th:if="${order.status == 'CANCELLED'}">
                                    <i class="bi bi-x-circle"></i> Cancelled
                                </span>

                                <div class="d-flex align-items-center">
                                    <span class="amount">
                                        ₹<span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}"></span>
                                    </span>
                                    <i class="bi bi-chevron-right chevron"></i>
                                </div>

                            </div>

                        </div>

                    </div>
                </div>
            </a>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
