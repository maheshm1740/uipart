
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .order-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border-radius: 12px;
        }

        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15) !important;
            border-left: 4px solid #0d6efd;
        }
    </style>
</head>

<body style="background-color:#f5f7fa;">

<div class="container py-4" style="max-width: 1100px;">

    <div class="mb-4">
        <h3 class="fw-bold mb-1">My Orders</h3>
        <p class="text-muted mb-0">
            View and track all your orders
        </p>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(orders)}"
         class="card shadow-sm">

        <div class="card-body text-center py-5">

            <i class="bi bi-bag-x fs-1 text-secondary"></i>

            <h5 class="mt-3">
                No Orders Found
            </h5>

            <p class="text-muted mb-0">
                You have not placed any orders yet.
            </p>

        </div>

    </div>

    <!-- Orders -->
    <div th:unless="${#lists.isEmpty(orders)}">

        <div th:each="order : ${orders}">

            <a th:href="@{/orders/{id}(id=${order.orderId})}"
               class="text-decoration-none text-dark">

                <div class="card shadow-sm mb-3 order-card">

                    <div class="card-body">

                        <div class="row align-items-center">

                            <!-- Images -->
                            <div class="col-lg-3 col-md-4 mb-3 mb-md-0">

                                <div class="d-flex gap-2 flex-wrap">

                                    <th:block th:each="item,iter : ${order.items}">

                                        <img th:if="${iter.index < 2}"
                                             th:src="${item.itemUrl}"
                                             th:alt="${item.productName}"
                                             class="img-thumbnail"
                                             style="width:70px;height:70px;object-fit:contain;">

                                    </th:block>

                                    <div th:if="${#lists.size(order.items) > 2}"
                                         class="border rounded d-flex align-items-center justify-content-center bg-light fw-semibold"
                                         style="width:70px;height:70px;">

                                        +<span th:text="${#lists.size(order.items)-2}"></span>

                                    </div>

                                </div>

                            </div>

                            <!-- Product Details -->
                            <div class="col-lg-5 col-md-5">

                                <h6 class="fw-bold mb-1"
                                    th:if="${!#lists.isEmpty(order.items)}"
                                    th:text="${order.items[0].productName}">
                                </h6>

                                <small class="text-muted"
                                       th:if="${#lists.size(order.items) > 1}">

                                    +
                                    <span th:text="${#lists.size(order.items)-1}"></span>
                                    more item(s)

                                </small>

                                <div class="mt-2 text-muted small">
                                    Order #
                                    <span th:text="${order.orderId}"></span>
                                </div>

                                <div class="text-muted small">
                                    Ordered on
                                    <span th:text="${#temporals.format(order.orderDate,'dd MMM yyyy')}">
                                    </span>
                                </div>

                            </div>

                            <!-- Status & Amount -->
                            <div class="col-lg-4 col-md-3 text-md-end mt-3 mt-md-0">

                                <div class="mb-2">

                                    <span class="badge bg-success"
                                          th:if="${order.status == 'DELIVERED'}">
                                        Delivered
                                    </span>

                                    <span class="badge bg-primary"
                                          th:if="${order.status == 'PROCESSING'}">
                                        Processing
                                    </span>

                                    <span class="badge bg-warning text-dark"
                                          th:if="${order.status == 'OUT FOR DELIVERY'}">
                                        Out For Delivery
                                    </span>

                                    <span class="badge bg-danger"
                                          th:if="${order.status == 'CANCELLED'}">
                                        Cancelled
                                    </span>

                                </div>

                                <div class="fw-bold fs-5">
                                    ₹<span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}">
                                    </span>
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
